version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quizrush_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-quizrush}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quizrush123}
      POSTGRES_DB: ${DB_NAME:-quizrush}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quizrush_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-quizrush}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizrush_backend
    restart: unless-stopped
    ports:
      - '6001:6001'
    environment:
      NODE_ENV: production
      PORT: 6001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-quizrush}
      DB_PASSWORD: ${DB_PASSWORD:-quizrush123}
      DB_NAME: ${DB_NAME:-quizrush}
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:3002}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:6001/api/auth/google/callback}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quizrush_network

  frontend:
    build:
      context: ../quizrush-front
      dockerfile: Dockerfile
    container_name: quizrush_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6001/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:6001}
    depends_on:
      - backend
    networks:
      - quizrush_network

  admin:
    build:
      context: ../quizrush-admin
      dockerfile: Dockerfile
    container_name: quizrush_admin
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:6001/api}
    depends_on:
      - backend
    networks:
      - quizrush_network

volumes:
  postgres_data:

networks:
  quizrush_network:
    driver: bridge
